<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>instagram</title>
</head>
<body>
    <div class="wrapper">

        <!-- Container maior -->
        <div class="container">

            <!-- Coluna esquerda -->
            <div class="column left"> 
                <div class="main"></div>
            </div>

            <!-- Coluna direita -->
            <div class="column right">
                <div class="login-panel">
                    <div class="logo">
                        <img src="assets/logo.png" alt="instagram">
                    </div>
                    <form >
                        <input type="text" placeholder="Telefone, nome de usuário ou email">
                        <input type="password" placeholder="Senha">

                        <input type="submit" value="Entrar">
                       
                    </form>

                </div>
                <div class="infobox">
                    <p>Não tem uma conta? <a href="signup.html">Cadastre-se</a></p>
                </div>

                <div class="get-app-panel">
                    Obtenha o aplicativo.
                    <div class="app-buttons">
                        <a href="#">
                            <img src="assets/appstore.png" alt="appstore">
                        </a>
                        <a href="#">
                            <img src="assets/googleplay.png" alt="playstore">
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Rodapé -->
         <footer>
            <div class="footer-inner">
                <a href="#">About us</a>
                <a href="#">Support</a>
                <a href="#">Press</a>
                <a href="#">Blog</a>
                <a href="#">Api</a>
                <a href="#">Jobs</a>
                <a href="#">Privacy</a>
                <a href="#">Terms</a>
                <a href="#">Directory</a>
                <a href="#">Profile</a>
                <a href="#">Language</a>
                <a href="#">Hashtags</a>
                <div class="text-small">@ 2022 Instagram </div>
            </div>
         </footer>
    </div>
</body>
</html>
