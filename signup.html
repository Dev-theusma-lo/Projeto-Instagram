<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Faça seu cadastro</title>
  </head>
  <body>

    <div class="wrapper">

      <!-- Container maior -->
      <div class="container-signup">

        <!-- Coluna Central -->
        <div class="column">

          <div class="signup-panel">

            <div class="logo">
              <img src="assets/logo.png" alt="instagram" />
            </div>

            <div class="message">
              <span> Cadastre-se para ver fotos e vídeos dos seus amigos.</span>
            </div>

            <button class="facebook-button">Entrar com Facebook</button>

            <div>

              <div class="divisor-container">
                <div class="line"></div>
                <div class="divisor-tag">ou</div>
                <div class="line"></div>
              </div>

            </div>

            <form>

              <input type="text" placeholder="Número de celular ou email" name="email"/>
              <input type="text" placeholder="Nome Completo" name="name"/>
              <input type="text" placeholder="Nome de usuário" name="username"/>
              <input type="password" placeholder="Senha" name="password"/>
              <input type="submit" value="Entrar"/>

            </form>

          </div>

          <div class="infobox">

            <p>Tem uma conta? <a href="index.html">Conecte-se</a></p>

          </div>

          <div class="get-app-panel">
            Obtenha o aplicativo.

            <div class="app-buttons">

              <a href="#">
                <img src="assets/appstore.png" alt="appstore" />
              </a>

              <a href="#">
                <img src="assets/googleplay.png" alt="playstore" />
              </a>

            </div>

          </div>

        </div>

      </div>

      <!-- Rodapé -->
      <footer>

        <div class="footer-inner">
          <a href="#">About us</a>
          <a href="#">Support</a>
          <a href="#">Press</a>
          <a href="#">Blog</a>
          <a href="#">Api</a>
          <a href="#">Jobs</a>
          <a href="#">Privacy</a>
          <a href="#">Terms</a>
          <a href="#">Directory</a>
          <a href="#">Profile</a>
          <a href="#">Language</a>
          <a href="#">Hashtags</a>
          <div class="text-small">@ 2022 Instagram</div>

        </div>

      </footer>

    </div>
    
  </body>
</html>
